name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '17 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run unit + integration tests (sqlite)
        run: python -m unittest discover -s tests -v

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: canno
          POSTGRES_USER: canno
          POSTGRES_PASSWORD: canno
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U canno"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install postgres driver
        run: python -m pip install psycopg[binary]
      - name: Run tests with postgres
        env:
          CANNO_DATABASE_URL: postgresql://canno:canno@127.0.0.1:5432/canno
          CANNO_ADMIN_PASSWORD: test-admin-password
        run: python -m unittest discover -s tests -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t canno:ci .

  backup-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create sample DB and backup
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from canno.repositories.db import QuestRepository, create_repository

          repo = QuestRepository(create_repository("sqlite://./ci_backup_test.db"))
          repo.apply_migrations(datetime.now(timezone.utc).isoformat())
          PY
          python scripts/backup_db.py --db ci_backup_test.db --out-dir backups
      - name: Validate backup integrity and schema baseline
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          required = {"schema_migrations", "quests", "steps", "participants", "attempts"}
          backups = sorted(Path("backups").glob("ci_backup_test_*.db"))
          if not backups:
              raise SystemExit("No backup file produced")

          backup = backups[-1]
          conn = sqlite3.connect(backup)
          cur = conn.cursor()
          cur.execute("PRAGMA integrity_check;")
          status = cur.fetchone()[0]
          if status != "ok":
              raise SystemExit(f"Integrity check failed: {status}")
          cur.execute("SELECT name FROM sqlite_master WHERE type='table'")
          tables = {row[0] for row in cur.fetchall()}
          missing = sorted(required - tables)
          if missing:
              raise SystemExit(f"Missing required tables: {', '.join(missing)}")
          conn.close()
          print(f"Validated backup: {backup}")
          PY
