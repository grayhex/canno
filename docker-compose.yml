services:
  web:
    build: .
    container_name: canno-web
    ports:
      - "${CANNO_PORT:-8000}:8000"
    environment:
      CANNO_ADMIN_USER: ${CANNO_ADMIN_USER:-admin}
      CANNO_ADMIN_PASSWORD_HASH: ${CANNO_ADMIN_PASSWORD_HASH:-}
      CANNO_ADMIN_PASSWORD: ${CANNO_ADMIN_PASSWORD:-}
      CANNO_SECRET_KEY: ${CANNO_SECRET_KEY:-change-this-secret-key}
      CANNO_LOG_LEVEL: ${CANNO_LOG_LEVEL:-INFO}
      CANNO_DB_ENGINE: ${CANNO_DB_ENGINE:-sqlite}
      CANNO_DB_PATH: ${CANNO_DB_PATH:-/data/canno.db}
      CANNO_DATABASE_URL: ${CANNO_DATABASE_URL:-}
    volumes:
      - canno_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: canno-postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canno}
      POSTGRES_USER: ${POSTGRES_USER:-canno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canno}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-canno} -d ${POSTGRES_DB:-canno}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  canno_data:
  pg_data:
